<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали фильма - Velvet Screen</title>
    <link rel="icon" type="image/jpg" sizes="32x32" href="image/ikonk.jpg">
    <link rel="stylesheet" href=".css/movie-detailindex2.css">
</head>
<body>
    <!-- Убираем весь header -->

    <div class="container">
        <div class="back-button">
            <a href="V_Screen.html" class="back-btn">← Вернуться на главную</a>
        </div>

        <div class="movie-detail" id="movieDetail">
            <div class="movie-poster">
                <img src="" alt="" id="poster">
            </div>
            <div class="movie-info">
                <h1 class="movie-title"><span id="title"></span></h1>
                <div class="movie-meta">
                    <div class="meta-item"> <span id="year"></span></div>
                    <div class="meta-item"> <span id="duration"></span></div>
                    <div class="meta-item"> <span id="genre"></span></div>
                    <div class="meta-item rating">⭐ <span id="rating" class="value"></span></div>
                </div>
                <div class="movie-description">
                    <h3>О фильме</h3>
                    <p id="desc"></p>
                </div>
                <div class="action-buttons">
                    <button class="btn-watch">▶ Смотреть фильм</button>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 Velvet Screen. Все права защищены.</p>
        <p>Ваш онлайн-кинотеатр для просмотра фильмов и сериалов</p>
    </div>

    <script src="movie-detail.js"> </script>
</body>
</html>
